<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Our Wildlife</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container py-5" aria-labelledby="page-title">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          
          <div class="card custom-card p-4 p-md-5 rounded-4">
            <h1 id="page-title" class="fw-bold mb-4">Save Our Wildlife</h1>

            <section class="video-section d-flex flex-column gap-4" aria-label="Wildlife promotional video section">
              <video
                id="wildlifeVideo"
                class="w-100 rounded-3 border border-danger shadow-sm"
                controls
                preload="metadata"
                aria-describedby="videoDescription"
              >
                <source src="wildlife.mp4" type="video/mp4" />
                Your browser does not support the video tag.
              </video>

              <p id="videoDescription" class="text-center text-secondary m-0 fs-5">
                Wildlife conservation protects endangered species, restores habitats,
                and helps keep ecosystems healthy for future generations.
              </p>

              <button
                id="videoActionBtn"
                type="button"
                class="btn btn-danger rounded-pill px-4 py-3 mx-auto d-flex align-items-center justify-content-center shadow gap-2 fw-semibold"
                aria-controls="wildlifeVideo"
                aria-pressed="false"
              >
                <i id="btnIcon" class="bi bi-eye-slash-fill fs-5"></i>
                <span id="btnText">Hide Video</span>
              </button>
            </section>
            
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
